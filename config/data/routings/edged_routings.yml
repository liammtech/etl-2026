fragments:

  saw_work_centres:
    3mm: DSAW03
    4mm: DSAW04
    6mm: DSAW06
    7mm: DSAW07
    8mm: DSAW08
    9mm: DSAW09
    12mm: DSAW12
    15mm: DSAW15
    16mm: DSAW16
    18mm: DSAW18
    19mm: DSAW19
    22mm: DSAW22
    25mm: DSAW25

  source:
    nest:
      operations:
        - work_centre: DNEST
          milestone: Y

    rout:
      operations:
        - work_centre_from_context: thickness
          lookup: saw_work_centres
          milestone: Y

        - work_centre: DROUT
          milestone: Y

  edging_work_centres:
    "0": null
    "1": DEBAN1
    "2": DEBAN2
    "3": DEBAN3
    "4": DEBAN4

  edging:
    operations:
      - work_centre_from_context: edge_count
        lookup: edging_work_centres
        skip_if_null: true
        milestone: Y

  drilling:
    production_work_centres:
      DBIESSE: BIESSE DRILL
      DCYFLE: DRILL/GROOVE SCM CYFLEX F900 PRO
      DDRILL: P&H DRILLING DEPARTMENT
      DFAM: FAM RAIL DRILL
      DMORBI: MORBIDELLI THROUGH FEED DRILL
      DSPRIN: SPRINT - 5 PIECE

    production:
      insert_after_prefix: DEBAN

    mto:
      work_centre: DPDRL
      insert_after: DPCHK

  packaging:
    packaging_work_centres:
      DCPKU1: CARTON PACKING - UNIT 1
      DCPKU2: CARTON PACKING - UNIT 2
      DPACKM: LAYFLAT PACKING PROFILES

    stocked:
      replace: DSHRIN

    mto:
      insert_before: DPPICK

    oem:
      insert_before: 
        - DPKDRB
        - DPALPK

  finish:
    stocked:
      operations:
        - work_centre: DSHRIN
          milestone: Y

    mto:
      pre_drilling_ops:
        - work_centre: DPPICK
          milestone: Y
        - work_centre: DPCHK
          milestone: N

      post_drilling_ops:
        - work_centre: DPPACK
          milestone: Y
        - work_centre: DPDESP
          milestone: Y

    oem:
      operations:
        - work_centre_from_context: pallet_type
          lookup: pallet_work_centres
          milestone: Y

  pallet_work_centres:
    standard_pallet: DPKDRB
    long_pallet: DPALPK


templates:

  edged_stocked_nested:
    source_method: nest
    destination: stocked

  edged_stocked_routed:
    source_method: rout
    destination: stocked

  edged_mto_nested:
    source_method: nest
    destination: mto

  edged_mto_routed:
    source_method: rout
    destination: mto

  edged_oem_nested:
    source_method: nest
    destination: oem

  edged_oem_routed:
    source_method: rout
    destination: oem