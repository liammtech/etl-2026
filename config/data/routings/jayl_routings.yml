      - work_centre: DSHRIN
        milestone: Y

    mto_before_drill:
      - work_centre: DPPICK
        milestone: Y
      - work_centre: DPCHK
        milestone: N

    mto_after_drill:
      - work_centre: DPPACK
        milestone: Y
      - work_centre: DPDESP
        milestone: Y

    oem:
      - work_centre: DPKDRB
        milestone: Y

