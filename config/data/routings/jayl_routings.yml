fragments:

  source:
    stocked:
      - work_centre: DJSAW
        milestone: N
      - work_centre: DJDET
        milestone: Y

    mto:
      - work_centre: DSAWC
        milestone: N
      - work_centre: DJDET
        milestone: Y

  edging:
    wrapped_bottom:
      - work_centre: DEBAN2
        milestone: Y

    edged_bottom:
      - work_centre: DEBAN3
        milestone: Y

  shaping:
    standard:
      - work_centre: DJSHAP
        milestone: Y

  drilling:
    production_ddrill:
      - work_centre: DDRILL
        milestone: Y

    warehouse_dpdrill:
      - work_centre: DPDRL
        milestone: Y

  finish:
