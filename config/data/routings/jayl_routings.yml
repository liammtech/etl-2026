fragments:

  source:
    stocked:
      operations:
        - work_centre: DJSAW
          milestone: N
        - work_centre: DJDET
          milestone: Y

    mto:
      operations:
        - work_centre: DSAWC
          milestone: N
        - work_centre: DJDET
          milestone: Y

  edging:
    wrapped:
      operations:
        - work_centre: DEBAN2
          milestone: Y

    edged:
      operations:
        - work_centre: DEBAN3
          milestone: Y

  shaping:
    standard:
      operations:
        - work_centre: DJSHAP
          milestone: Y

  drilling:
    production_work_centres:
      DBIESSE: BIESSE DRILL
      DCYFLE: DRILL/GROOVE SCM CYFLEX F900 PRO
      DDRILL: P&H DRILLING DEPARTMENT
      DFAM: FAM RAIL DRILL
      DMORBI: MORBIDELLI THROUGH FEED DRILL
      DSPRIN: SPRINT - 5 PIECE

    production:
      insert_after_prefix: DEBAN

    mto:
      work_centre: DPDRL
      insert_after: DPCHK

  packaging:
    packaging_work_centres:
      DCPKU1: CARTON PACKING - UNIT 1
      DCPKU2: CARTON PACKING - UNIT 2
      DPACKM: LAYFLAT PACKING PROFILES

    stocked:
      replace: DSHRIN

    mto:
      insert_before: DPPICK

    oem:
      insert_before: 
        - DPKDRB
        - DPALPK

  finish:
    stocked:
      operations:
        - work_centre: DSHRIN
          milestone: Y

    mto:
      pre_drilling_ops:
        - work_centre: DPPICK
          milestone: Y
        - work_centre: DPCHK
          milestone: N

      post_drilling_ops:
        - work_centre: DPPACK
          milestone: Y
        - work_centre: DPDESP
          milestone: Y

    oem:
      operations:
        - work_centre: DPKDRB
          milestone: Y


templates:

  stocked_wrapped:
    edge_type: wrapped
    destination: stocked
    source: stocked

  stocked_edged:
    edge_type: edged
    destination: stocked
    source: stocked

  mto_wrapped:
    edge_type: wrapped
    destination: mto
    source: mto

  mto_edged:
    edge_type: edged
    destination: mto
    source: mto

  oem_wrapped:
    edge_type: wrapped
    destination: oem
    source: stocked

  oem_edged:
    edge_type: edged
    destination: oem
    source: stocked